<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bishal — Creative Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0E0D0C;--bg2:#181614;--bg3:#201E1B;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
    --coral:#E8603C;--coral-lt:#F5956E;--amber:#E8A43C;--amber-lt:#F5C06E;--teal:#3CBFA8;
    --text:#F0EDE8;--text2:#9E9890;--text3:#5C5750;
    --radius:10px;--radius-lg:16px;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;line-height:1.7;min-height:100vh}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .container{max-width:1060px;margin:0 auto;padding:0 2rem}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.1rem 0;background:rgba(14,13,12,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between}
  .nav-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--text);letter-spacing:-0.5px}
  .nav-logo span{color:var(--coral)}
  .nav-links{display:flex;gap:2rem;list-style:none}
  .nav-links a{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:0.04em;transition:color 0.2s;position:relative}
  .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1.5px;background:var(--coral);transition:width 0.25s}
  .nav-links a:hover,.nav-links a.active{color:var(--text)}
  .nav-links a:hover::after,.nav-links a.active::after{width:100%}
  .nav-cta{background:var(--coral);color:#fff;font-size:13px;font-weight:500;padding:8px 18px;border-radius:30px;transition:background 0.2s,transform 0.15s}
  .nav-cta:hover{background:var(--coral-lt);transform:translateY(-1px)}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
  .hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s}
  .mobile-menu{display:none;flex-direction:column;background:var(--bg2);border-top:1px solid var(--border)}
  .mobile-menu a{padding:1rem 2rem;font-size:15px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);transition:color 0.2s,background 0.2s}
  .mobile-menu a:hover{color:var(--text);background:var(--bg3)}
  .mobile-menu.open{display:flex}

  /* HERO */
  #hero{padding:10rem 0 6rem;min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden}
  .hero-noise{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none}
  .hero-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(232,96,60,0.12) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;animation:floatGlow 8s ease-in-out infinite}
  .hero-glow2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(60,191,168,0.08) 0%,transparent 70%);bottom:-150px;left:-100px;pointer-events:none;animation:floatGlow 10s ease-in-out infinite reverse}
  @keyframes floatGlow{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
  .hero-inner{position:relative;z-index:1}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--coral);border:1px solid rgba(232,96,60,0.3);padding:5px 14px;border-radius:30px;margin-bottom:1.75rem;animation:fadeUp 0.6s ease both}
  .hero-badge::before{content:'';width:6px;height:6px;background:var(--coral);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
  .hero-h1{font-family:'Playfair Display',serif;font-size:clamp(44px,7vw,82px);font-weight:700;line-height:1.08;letter-spacing:-2px;margin-bottom:0.2em;animation:fadeUp 0.7s 0.1s ease both}
  .hero-h1 em{font-style:italic;color:var(--coral);position:relative;display:inline-block}
  .hero-h1 em svg.underline{position:absolute;bottom:-6px;left:0;width:100%;height:12px;overflow:visible}
  .hero-h1 em svg.underline path{stroke:var(--amber);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:300;stroke-dashoffset:300;animation:drawLine 1s 0.8s cubic-bezier(0.4,0,0.2,1) forwards}
  @keyframes drawLine{to{stroke-dashoffset:0}}
  .hero-sub{font-size:clamp(16px,2vw,19px);color:var(--text2);max-width:560px;line-height:1.7;margin:1.5rem 0 2.5rem;animation:fadeUp 0.7s 0.2s ease both}
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp 0.7s 0.3s ease both}
  .btn-primary{background:var(--coral);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;padding:13px 28px;border-radius:30px;border:none;cursor:pointer;transition:background 0.2s,transform 0.15s;text-decoration:none;display:inline-block}
  .btn-primary:hover{background:var(--coral-lt);transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;padding:12px 28px;border-radius:30px;border:1px solid var(--border2);cursor:pointer;transition:border-color 0.2s,background 0.2s,transform 0.15s;text-decoration:none;display:inline-block}
  .btn-ghost:hover{border-color:var(--text2);background:var(--bg3);transform:translateY(-2px)}
  .hero-stats{display:flex;gap:3rem;margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border);animation:fadeUp 0.7s 0.4s ease both}
  .stat-num{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);line-height:1}
  .stat-num span{color:var(--coral)}
  .stat-label{font-size:12px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-top:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  /* SECTIONS */
  section{padding:6rem 0}
  .section-label{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--coral);margin-bottom:0.6rem}
  .section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:700;line-height:1.15;letter-spacing:-1px;margin-bottom:3rem}
  .section-title em{font-style:italic;color:var(--amber)}

  /* ABOUT */
  #about{background:var(--bg2)}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
  .about-visual{aspect-ratio:4/5;background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .about-art{position:absolute;inset:0;background:conic-gradient(from 210deg at 40% 60%,#E8603C22 0deg,#3CBFA822 120deg,#E8A43C22 240deg,#E8603C22 360deg);animation:rotateArt 20s linear infinite}
  @keyframes rotateArt{to{transform:rotate(360deg)}}
  .about-initials{font-family:'Playfair Display',serif;font-style:italic;font-size:100px;font-weight:700;color:rgba(255,255,255,0.06);position:relative;z-index:1;user-select:none}
  .about-photo{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;z-index:1}
  .about-tag{position:absolute;bottom:1.5rem;left:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);z-index:2}
  .about-tag strong{display:block;color:var(--text);font-size:15px}
  .about-text p{color:var(--text2);line-height:1.8;margin-bottom:1.2rem;font-size:15px}
  .about-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2rem;margin-top:1.5rem}
  .pill{font-size:12px;font-weight:500;padding:5px 14px;border-radius:30px;border:1px solid var(--border);color:var(--text2);transition:border-color 0.2s,color 0.2s}
  .pill:hover{border-color:var(--coral);color:var(--coral)}

  /* PROJECTS */
  .projects-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2.5rem}
  .filter-btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;padding:6px 16px;border-radius:30px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.2s}
  .filter-btn.active,.filter-btn:hover{background:var(--coral);border-color:var(--coral);color:#fff}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s}
  .proj-card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .proj-thumb{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;overflow:hidden}
  .pt-1{background:linear-gradient(135deg,#1a1018 0%,#3d1a28 100%)}
  .pt-2{background:linear-gradient(135deg,#0e1a18 0%,#0f3d2e 100%)}
  .pt-3{background:linear-gradient(135deg,#1a110e 0%,#3d1e0e 100%)}
  .pt-4{background:linear-gradient(135deg,#100e1a 0%,#22103d 100%)}
  .pt-5{background:linear-gradient(135deg,#0e1a17 0%,#163d30 100%)}
  .pt-6{background:linear-gradient(135deg,#1a0f0e 0%,#3d160e 100%)}
  .proj-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .proj-overlay{position:absolute;inset:0;background:rgba(14,13,12,0);transition:background 0.3s}
  .proj-card:hover .proj-overlay{background:rgba(14,13,12,0.3)}
  .proj-body{padding:1.25rem 1.5rem 1.5rem}
  .proj-cats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .proj-cat{font-size:10px;font-weight:500;letter-spacing:0.06em;padding:3px 10px;border-radius:20px;text-transform:uppercase}
  .cat-brand{background:rgba(232,96,60,0.12);color:var(--coral)}
  .cat-ui{background:rgba(60,191,168,0.12);color:var(--teal)}
  .cat-illo{background:rgba(232,164,60,0.12);color:var(--amber)}
  .cat-print{background:rgba(158,152,144,0.12);color:var(--text2)}
  .proj-name{font-size:17px;font-weight:500;margin-bottom:6px}
  .proj-desc{font-size:13px;color:var(--text2);line-height:1.6}
  .proj-arrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--coral);margin-top:14px;transition:gap 0.2s}
  .proj-card:hover .proj-arrow{gap:10px}

  /* RESUME */
  #resume{background:var(--bg2)}
  .resume-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
  .resume-col-title{font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:1.5rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
  .timeline{display:flex;flex-direction:column}
  .tl-item{display:grid;grid-template-columns:1px 1fr;gap:0 1.5rem;position:relative;padding-bottom:2rem}
  .tl-item:last-child{padding-bottom:0}
  .tl-line{width:1px;background:var(--border);position:relative}
  .tl-line::before{content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 3px rgba(232,96,60,0.15)}
  .tl-year{font-size:11px;color:var(--text3);letter-spacing:0.05em;margin-bottom:4px;padding-top:2px}
  .tl-role{font-size:15px;font-weight:500;color:var(--text)}
  .tl-org{font-size:13px;color:var(--coral);margin:3px 0}
  .tl-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-top:6px}
  .skills-section{grid-column:1/-1;margin-top:1rem}
  .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:1rem}
  .skill-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .skill-name{font-size:13px;font-weight:500}
  .skill-bar{width:60px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
  .skill-fill{height:100%;background:var(--coral);border-radius:3px;transform-origin:left;animation:fillBar 1.5s ease forwards}
  @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}

  /* BLOG */
  .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .blog-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem;cursor:pointer;transition:transform 0.25s,border-color 0.25s;display:flex;flex-direction:column}
  .blog-card:hover{transform:translateY(-4px);border-color:var(--border2)}
  .blog-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .blog-tag{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
  .blog-date{font-size:12px;color:var(--text3)}
  .blog-title{font-size:17px;font-weight:500;line-height:1.4;margin-bottom:0.75rem}
  .blog-excerpt{font-size:13px;color:var(--text2);line-height:1.65;flex:1}
  .blog-read{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--amber);margin-top:1.25rem;transition:gap 0.2s}
  .blog-card:hover .blog-read{gap:9px}

  /* CONTACT */
  #contact{background:var(--bg2)}
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
  .contact-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(22px,3vw,30px);color:var(--text2);line-height:1.5;margin-bottom:2.5rem}
  .contact-quote em{color:var(--text);font-style:normal}
  .contact-links{display:flex;flex-direction:column;gap:12px}
  .contact-link{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);transition:border-color 0.2s,transform 0.2s;text-decoration:none}
  .contact-link:hover{border-color:var(--border2);transform:translateX(4px)}
  .contact-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .ci-coral{background:rgba(232,96,60,0.12);color:var(--coral)}
  .ci-teal{background:rgba(60,191,168,0.12);color:var(--teal)}
  .ci-amber{background:rgba(232,164,60,0.12);color:var(--amber)}
  .ci-gray{background:rgba(158,152,144,0.12);color:var(--text2)}
  .contact-link-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
  .contact-link-val{font-size:14px;font-weight:500;color:var(--text)}
  .contact-form{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:7px;letter-spacing:0.04em}
  .form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s}
  .form-group input::placeholder,.form-group textarea::placeholder{color:var(--text3)}
  .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--coral)}
  .form-group textarea{resize:vertical;min-height:100px}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-submit{width:100%;background:var(--coral);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;padding:13px;border-radius:30px;border:none;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:6px}
  .form-submit:hover{background:var(--coral-lt);transform:translateY(-1px)}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 20px;font-size:14px;font-weight:500;color:var(--text);z-index:999;transform:translateY(80px);opacity:0;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast-icon{color:var(--teal);margin-right:8px}

  /* FOOTER */
  footer{background:var(--bg);border-top:1px solid var(--border);padding:2.5rem 0;text-align:center}
  .footer-name{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--text);margin-bottom:0.5rem}
  .footer-name span{color:var(--coral)}
  .footer-copy{font-size:13px;color:var(--text3)}

  /* SCROLL REVEAL */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.65s ease,transform 0.65s ease}
  .reveal.visible{opacity:1;transform:translateY(0)}

  /* ADMIN LINK */
  .admin-btn{position:fixed;bottom:1.2rem;left:1.2rem;font-size:11px;color:var(--text3);text-decoration:none;opacity:0.3;transition:opacity 0.2s;z-index:50;background:var(--bg2);border:1px solid var(--border);padding:5px 10px;border-radius:6px}
  .admin-btn:hover{opacity:1}

  /* RESPONSIVE */
  @media(max-width:768px){
    .nav-links,.nav-cta{display:none}
    .hamburger{display:flex}
    .about-grid,.resume-layout,.contact-grid{grid-template-columns:1fr}
    .about-visual{aspect-ratio:3/2}
    .form-row-2{grid-template-columns:1fr}
    .hero-stats{gap:2rem;flex-wrap:wrap}
    .skills-section{grid-column:1}
  }
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
  }
</style>

// ─── INIT ──────────────────────────────────────────────────────
function initAll() {
  // Scroll reveal
  const ro = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('visible'); ro.unobserve(e.target); }});
  },{threshold:0.1});
  document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));

  // Nav active
  const secs = document.querySelectorAll('section[id]');
  const navAs = document.querySelectorAll('.nav-a');
  const no = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ navAs.forEach(a=>a.classList.remove('active')); const a=document.querySelector(`.nav-a[href="#${e.target.id}"]`); if(a)a.classList.add('active'); }});
  },{rootMargin:'-40% 0px -55% 0px'});
  secs.forEach(s=>no.observe(s));

  // Project filter
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      document.querySelectorAll('#projectsGrid .proj-card').forEach(c=>{
        c.style.display = (f==='all'||c.dataset.cats.includes(f))?'':'none';
      });
    });
  });

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener('click',e=>{
      const t=document.querySelector(a.getAttribute('href'));
      if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}
    });
  });
}

function initNav() {
  const ham = document.getElementById('hamburger');
  const mob = document.getElementById('mobileMenu');
  if(ham) ham.addEventListener('click',()=>mob.classList.toggle('open'));
  document.querySelectorAll('.mob-a').forEach(a=>a.addEventListener('click',()=>mob.classList.remove('open')));
}
